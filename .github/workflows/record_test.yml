name: 🎥 Test Stream Recording

on:
  workflow_dispatch: # Sirf manual run karne ke liye (Actions tab se)

jobs:
  test_recording:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install Dependencies (Puppeteer, FFmpeg, Xvfb)
        run: |
          npm init -y
          npm install puppeteer
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: 🎬 Run Script & Record (Virtual Screen)
        # xvfb-run ek virtual display (:99) banata hai jisko ffmpeg record karega
        run: xvfb-run --server-args="-screen 0 1280x720x24" node test_record.js

      - name: 📤 Upload Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stream-20sec-Test
          path: test_output.mp4
